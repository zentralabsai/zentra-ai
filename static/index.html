<!DOCTYPE html>
<html>
<head>
<title>Roofing AI Assistant</title>

<style>
*{box-sizing:border-box;}

body{
font-family:Arial,sans-serif;
margin:0;
background:transparent;
}

#chat-toggle{
position:fixed;
bottom:20px;
right:20px;
width:60px;
height:60px;
border-radius:50%;
border:none;
background:#007aff;
color:white;
font-size:24px;
cursor:pointer;
box-shadow:0 8px 20px rgba(0,0,0,0.2);
z-index:10001;
}

#chatbox{
position:fixed;
bottom:90px;
right:20px;
width:380px;
height:520px;
background:white;
border-radius:16px;
box-shadow:0 8px 30px rgba(0,0,0,0.18);
padding:16px;
display:flex;
flex-direction:column;
}

#messages{
flex:1;
overflow-y:auto;
margin-bottom:10px;
}

.message{margin-bottom:10px;}
.user{text-align:right;color:#007aff;}
.ai{text-align:left;color:#333;}

.input-row{
display:flex;
gap:8px;
}

.input-row input{
flex:1;
padding:10px;
border-radius:6px;
border:1px solid #ddd;
}

button{
padding:10px 14px;
border:none;
background:#007aff;
color:white;
border-radius:6px;
cursor:pointer;
}

.quick-buttons{
display:flex;
flex-wrap:wrap;
gap:6px;
margin-top:10px;
}

.quick-buttons button{
background:#f3f6fb;
color:#333;
border:1px solid #dbe3f0;
border-radius:20px;
padding:6px 12px;
font-size:13px;
}

.typing span{
display:inline-block;
width:6px;
height:6px;
margin:0 2px;
background:#888;
border-radius:50%;
animation:blink 1.4s infinite both;
}

@keyframes blink{
0%{opacity:.2;}
20%{opacity:1;}
100%{opacity:.2;}
}
</style>
</head>

<body>

<button id="chat-toggle" onclick="toggleChat()">💬</button>

<div id="chatbox" style="display:none;">

<h3>Roofing AI Assistant</h3>

<div id="messages">

<div class="message ai">
Hi! 👋 I can help you get a fast roofing repair quote.<br><br>
What issue are you having with your roof?
</div>

<div class="quick-buttons">
<button onclick="quickReply('Active roof leak')">🚨 Active Leak</button>
<button onclick="quickReply('Storm damage')">🌩 Storm Damage</button>
<button onclick="quickReply('Missing shingles')">🧱 Missing Shingles</button>
<button onclick="quickReply('General roof repair')">🛠 General Repair</button>
</div>

</div>

<div class="input-row">
<input id="question" type="text" placeholder="Ask about roof repair..." onkeypress="if(event.key==='Enter'){askAI()}" />
<button onclick="askAI()">Send</button>
</div>

</div>

<script>

let history="";

function toggleChat(){
const chatbox=document.getElementById("chatbox");
chatbox.style.display=chatbox.style.display==="flex"?"none":"flex";
}

function quickReply(text){
document.getElementById("question").value=text;
askAI();
}

function addMessage(text,type){
const container=document.getElementById("messages");
const msg=document.createElement("div");
msg.className="message "+type;
msg.innerText=text;
container.appendChild(msg);
container.scrollTop=container.scrollHeight;
}

function isValidEmail(v){
return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v);
}

function isValidPhone(v){
const digits=v.replace(/\D/g,"");
return digits.length>=7 && digits.length<=15;
}

async function askAI(){

const input=document.getElementById("question");
const question=input.value.trim();

if(!question){
alert("Please enter a message.");
return;
}

/* SMART VALIDATION BASED ON USER INPUT */

const digits=question.replace(/\D/g,"");

if(question.includes("@")){
if(!isValidEmail(question)){
alert("Please enter a valid email address.");
return;
}
}

else if(digits.length>=7){
if(!isValidPhone(question)){
alert("Please enter a valid phone number.");
return;
}
}

addMessage(question,"user");
input.value="";

const container=document.getElementById("messages");

const typing=document.createElement("div");
typing.className="message ai";
typing.innerHTML='<div class="typing"><span></span><span></span><span></span></div>';

container.appendChild(typing);
container.scrollTop=container.scrollHeight;

const res=await fetch(
"/ask?question="+encodeURIComponent(question)+"&history="+encodeURIComponent(history)
);

const data=await res.json();
let reply=data.ai_response||"";

let leadCaptured=false;

if(reply.includes("LEAD_CAPTURED")){
leadCaptured=true
}

let displayReply=reply

if(leadCaptured){
displayReply=reply.split("LEAD_CAPTURED")[0].trim()
}

if(leadCaptured){

const input=document.getElementById("question")
const sendButton=document.querySelector(".input-row button")

input.disabled=true
sendButton.disabled=true

input.placeholder="Lead submitted — a roofing specialist will contact you shortly"

}

const aiList=document.querySelectorAll("#messages .ai");
aiList[aiList.length-1].innerHTML=displayReply.replace(/\n/g,"<br>");
history+="User: "+question+"\nAI: "+reply+"\n";

}

</script>

</body>
</html>
