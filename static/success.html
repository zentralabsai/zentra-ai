<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment Successful | Kazfen</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0b1020;
      color: white;
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 20px;
    }
    img { width: 160px; margin-bottom: 32px; }
    .checkmark {
      width: 64px;
      height: 64px;
      background: #22c55e;
      border-radius: 999px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      margin-bottom: 24px;
    }
    h1 { font-size: 36px; margin-bottom: 12px; }
    p { color: #c7d2fe; font-size: 18px; margin-bottom: 12px; }
    .note { color: #94a3b8; font-size: 15px; margin-bottom: 28px; }
    a {
      display: inline-block;
      padding: 14px 28px;
      background: #2563eb;
      color: white;
      text-decoration: none;
      border-radius: 12px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <img src="/logo.png" alt="Kazfen logo">
  <div class="checkmark">✓</div>
  <h1>Payment Successful</h1>
