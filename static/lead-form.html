<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Request Roofing Quote | Kazfen</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0b1020;
      color: white;
      line-height: 1.5;
      padding: 40px 20px;
    }
    .logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo img {
      width: 160px;
    }
    .container {
      max-width: 560px;
      margin: 0 auto;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 32px;
    }
    h1 {
      font-size: 28px;
      margin-bottom: 8px;
    }
    .subtitle {
      color: #94a3b8;
      font-size: 15px;
      margin-bottom: 28px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: #c7d2fe;
      margin-bottom: 6px;
      margin-top: 18px;
    }
    label:first-of-type {
      margin-top: 0;
    }
    input, textarea, select {
      width: 100%;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.06);
      color: white;
      font-size: 15px;
      font-family: inherit;
    }
    input::placeholder, textarea::placeholder {
      color: #64748b;
    }
    select {
      color: white;
      appearance: auto;
    }
    select option {
      background: #1e293b;
      color: white;
    }
    textarea {
      min-height: 80px;
      resize: vertical;
    }
    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: #2563eb;
    }
    button {
      margin-top: 24px;
      background: #2563eb;
      color: white;
      padding: 16px;
      border: none;
      border-radius: 12px;
      width: 100%;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover {
      background: #1d4ed8;
    }
    #result {
      margin-top: 16px;
      text-align: center;
      font-size: 16px;
      color: #22c55e;
    }
    .back-link {
      display: block;
      text-align: center;
      margin-top: 24px;
      color: #94a3b8;
      text-decoration: none;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="logo">
    <a href="/"><img src="/logo.png" alt="Kazfen logo"></a>
  </div>
  <div class="container">
    <h1>Request Roofing Quote</h1>
    <p class="subtitle">Fill out the details below and a roofing contractor will follow up shortly.</p>

    <form id="leadForm">
      <label>Name</label>
      <input type="text" name="name" required placeholder="Full name">

      <label>Phone</label>
      <input type="tel" name="phone" required placeholder="(555) 123-4567">

      <label>Email</label>
      <input type="email" name="email" placeholder="email@example.com">

      <label>City / ZIP</label>
      <input type="text" name="location" placeholder="e.g. Kansas City, 64101">

      <label>Service Needed</label>
      <select name="service">
        <option>Roof Repair</option>
        <option>Roof Replacement</option>
        <option>Leak Inspection</option>
        <option>New Roof</option>
      </select>

      <label>Roof Type</label>
      <select name="roof_type">
        <option>Shingle</option>
        <option>Tile</option>
        <option>Metal</option>
        <option>Flat</option>
        <option>Other</option>
      </select>

      <label>Active Leak?</label>
      <select name="active_leak">
        <option>No</option>
        <option>Yes</option>
      </select>

      <label>Insurance Claim?</label>
      <select name="insurance_claim">
        <option>No</option>
        <option>Yes</option>
      </select>

      <label>Budget</label>
      <input type="text" name="budget" placeholder="Optional">

      <label>Preferred Inspection Time</label>
      <input type="text" name="preferred_inspection_time" placeholder="e.g. This week, mornings, ASAP">

      <label>Message</label>
      <textarea name="message" placeholder="Any additional details..."></textarea>

      <label>Urgency</label>
      <select name="urgency">
        <option>Low</option>
        <option>Medium</option>
        <option>High</option>
      </select>

      <button type="submit">Submit Request</button>
    </form>

    <p id="result"></p>
  </div>
  <a href="/" class="back-link">← Back to Kazfen</a>

  <script>
    document.getElementById("leadForm").addEventListener("submit", async function(e) {
      e.preventDefault();
      const formData = new FormData(this);
      const data = Object.fromEntries(formData.entries());
      const response = await fetch("/api/lead", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
      });
      const result = await response.json();
      document.getElementById("result").innerText = result.message;
    });
  </script>
</body>
</html>
